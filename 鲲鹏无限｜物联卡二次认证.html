<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>鲲鹏无限｜物联卡二次认证</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        animation: pageFadeIn 0.5s ease-in-out;
      }
      @keyframes pageFadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* 页面顶部LOGO容器样式 */
      .logo-box {
        text-align: center;
        margin-bottom: 20px;
      }
      .logo-box img {
        max-width: 100%;
        height: 60px;
        object-fit: contain;
      }
      .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 580px;
        transition: transform 0.3s ease;
      }
      .container:hover {
        transform: translateY(-2px);
      }
      h2 {
        text-align: center;
        color: #007b7a;
        margin-bottom: 35px;
        font-size: 24px;
        font-weight: 600;
        padding-bottom: 15px;
        border-bottom: 2px solid #f0f5ff;
      }
      .form-item {
        margin-bottom: 24px;
      }
      label {
        display: block;
        margin-bottom: 10px;
        color: #1f2937;
        font-weight: 500;
        font-size: 15px;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #e0e6ed;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        background: #fcfdff;
      }
      input:focus {
        border-color: #007b7a;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(0, 123, 122, 0.1);
      }
      input::placeholder {
        color: #9ca3af;
      }
      .btn-box {
        display: flex;
        gap: 12px;
        margin-top: 10px;
        margin-bottom: 20px;
      }
      button {
        flex: 1;
        padding: 14px;
        background: #007b7a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(0, 123, 122, 0.2);
      }
      button:hover {
        background: #006666;
        transform: translateY(-2px);
      }
      button:active {
        transform: translateY(0);
      }
      .copy-btn {
        background: #10b981;
      }
      .copy-btn:hover {
        background: #059669;
      }
      .copyright {
        text-align: center;
        margin-top: 30px;
        font-size: 12px;
        color: #9ca3af;
        padding-top: 15px;
        border-top: 1px solid #f0f5ff;
      }
      .toast {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background: #1f2937;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      /* 移动端LOGO适配 */
      @media (max-width: 480px) {
        .container {
          padding: 30px 24px;
        }
        .logo-box img {
          height: 48px;
          border-radius: 8px;
        }
        h2 {
          font-size: 20px;
        }
        .btn-box {
          flex-direction: column;
        }
      }
    </style>
  <style>#csdn-plugin-note-btn{
      position: fixed;
      z-index: 100;
      width: 25px;
      box-sizing: content-box;
      right: 0px;
      top: 20%;
      color: rgb(255, 255, 255);
      background: #fff;
      cursor: pointer;
      border-bottom-left-radius: 6px;
      padding: 10px 5px;
      border-top-left-radius: 6px;
      font-size: 16px;
      letter-spacing: 4px;
      box-shadow: 0px 2px 12px 0px rgba(123,123,123,0.26);
    }
    #csdn-plugin-note-btn img.logo{
      display: block; width:25px; height:25px; margin-bottom:2px;
    }
    #csdn-plugin-note-btn img.close{
      display: none; padding: 5px 5px 10px 5px; width: 15px; height: 15px; box-sizing: content-box; opacity:0.8;
    }
    #csdn-plugin-note-btn img.close:hover{opacity:1;}
    #csdn-plugin-note-btn:hover img.close{display: block;} 
    #csdn-plugin-note-btn:hover{ padding-bottom: 0;} 
    #csdn-plugin-note-btn span{

                .instant-setting-input { border: 1px solid #bbb; box-sizing: border-box; padding: 5px 10px; border-radius: 5px; width: 100px}

      <h2>物联卡二次认证</h2>
      <div class="form-item">
        <label>设备MAC：</label>
        <input type="text" id="terminalMac" placeholder="请输入设备MAC" oninput="generateUrl()">
      </div>
      <div class="form-item">
        <label>用户MAC：</label>
        <input type="text" id="mac" placeholder="请输入用户MAC" oninput="generateUrl()">
      </div>
      <div class="form-item">
        <label>iccid：</label>
        <input type="text" id="iccid" placeholder="请输入 iccid" oninput="generateUrl()">
      </div>
      <div class="btn-box">
        <button onclick="visitUrl()">点击访问</button>
        <button class="copy-btn" onclick="copyUrl()">复制链接</button>
      </div>
      <div class="copyright">Copyright © 2026 鲲鹏无限 版权所有</div>
    </div>

    <script>
      let resultUrl = ''
      // 核心链接生成逻辑 完全保留
      function generateUrl() {
        const tMac = document.getElementById('terminalMac').value.trim() || 'xxx'
        const mac = document.getElementById('mac').value.trim() || 'xxx'
        const iccid = document.getElementById('iccid').value.trim() || 'xxx'
        resultUrl = `https://wireless.api.cmonelink.com/wirelessAuthentication/authentication?terminalMac=${tMac}&mac=${mac}&iccid=${iccid}`
      }
      // 点击访问功能 完全保留
      function visitUrl() {
        generateUrl()
        window.open(resultUrl, '_blank')
        showToast('正在打开认证页面')
      }
      // 一键复制功能 全浏览器兼容
      function copyUrl() {
        if (!resultUrl) {
          showToast('请先输入参数生成链接')
          return
        }
        navigator.clipboard
          .writeText(resultUrl)
          .then(() => {
            showToast('复制成功！')
          })
          .catch(() => {
            const input = document.createElement('input')
            input.value = resultUrl
            document.body.appendChild(input)
            input.select()
            document.execCommand('copy')
            document.body.removeChild(input)
            showToast('复制成功！')
          })
      }
      // Toast轻提示功能 保留
      function showToast(text) {
        const toast = document.getElementById('toast')
        toast.innerText = text
        toast.classList.add('show')
        setTimeout(() => {
          toast.classList.remove('show')
        }, 2000)
      }
      // 页面加载初始化
      window.onload = function () {
        generateUrl()
      }
    </script>
